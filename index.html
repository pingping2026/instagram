<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header>
            <img class="font" src="images/logo.png">
            <img class="user" src="images/user-avatar.png">
        </header>
        <main>
            <img  class="post-user" id="poster" src="">
            <div class="container">
                <h1 id="name"></h1>
                <h2 id="location"></h2>
            </div>
        </main>
        <section>
            <img class="post-photo" id="photo" src="">
        </section>
        <section class="icon-size">
            <img class="icon" src="images/icon-heart.png">
            <img class="icon" src="images/icon-comment.png">
            <img class="icon" src="images/icon-dm.png">
        </section>
        
        <section>
            <p class="like" id="like"></p>
            <div class="comment">
                <p id="commenter"></p> 
                <p id="comment"></p>
            </div>
        </section>
        <script src="index.js"></script>
    </body>
</html>
